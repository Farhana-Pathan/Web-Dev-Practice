<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasheed Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div id="nasheed-player">
        <img id="nasheed-image" src="images/al-aqsa.jpg"/>
        <div id="nasheed-name">Nasheed</div>
        <div id="nasheed-artist">Artist</div>

        <input id="slider" type="range">

        <div id="nasheed-btns">
            <i id="shuffle-nasheed" class="fa-solid fa-shuffle"></i>
            <i id="prev-nasheed" class="fa-solid fa-backward-step fa-2x"></i>
            <i id="playpause-nasheed" class="fa-solid fa-circle-play fa-3x"></i>
            <i id="next-nasheed" class="fa-solid fa-forward-step fa-2x"></i>
            <i id="repeat-nasheed" class="fa-solid fa-repeat"></i>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
